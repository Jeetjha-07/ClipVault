version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: clipvault-app

    ports:
      - "3000:3000"

    env_file:
      - .env

    environment:
      MONGODB_URI: ${MONGODB_URI}

    restart: unless-stopped


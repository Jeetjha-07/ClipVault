name: ClipVault CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Validate server.js syntax
        run: node --check server.js

      - name: Check frontend files
        run: |
          if [ ! -d "main" ]; then
            echo "ERROR: main/ frontend directory not found"
            exit 1
          fi

      - name: Detect static path mismatch
        run: |
          if grep -q "public" server.js; then
            echo "WARNING: server.js may still reference public/"
          fi

      - name: Run npm audit
        run: npm audit --audit-level=high || true

      - name: Build Docker image
        run: docker build -t clipvault-app .

      - name: Validate Docker Compose
        run: docker compose config